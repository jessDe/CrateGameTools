name: .NET Core Desktop

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    permissions:
      contents: write

    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    env:
      Solution_Name: CrateGameTools.sln

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore ${{ env.Solution_Name }}

    - name: Build the application
      run: dotnet build ${{ env.Solution_Name }} --configuration ${{ matrix.configuration }} --no-restore

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: CrateGameTools-Binary
        path: CrateGameTools\bin\${{ matrix.configuration }}\net10.0-windows

    - name: Create release ZIP
      run: Compress-Archive -Path CrateGameTools\bin\${{ matrix.configuration }}\net10.0-windows\* -DestinationPath CrateGameTools-Release.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/'))
      with:
        tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('release-{0}', github.sha) }}
        name: ${{ github.ref_type == 'tag' && github.ref_name || format('Release {0}', github.sha) }}
        files: CrateGameTools-Release.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
